<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Portée Musicale Interactive</title>
<style>
  body { margin:0; background:#0f0f14; overflow:hidden; font-family:sans-serif; }
  canvas { display:block; }

  #popup {
    position:fixed;
    top:50%; left:50%;
    transform:translate(-50%,-50%) scale(0.9);
    background:#111;
    color:white;
    padding:20px;
    border-radius:12px;
    opacity:0;
    pointer-events:none;
    transition:0.3s;
    box-shadow:0 20px 60px rgba(0,0,0,0.6);
  }

  #popup.active {
    opacity:1;
    transform:translate(-50%,-50%) scale(1);
    pointer-events:auto;
  }

  #popup img { width:200px; border-radius:8px; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="popup"></div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

let W, H;
function resize(){
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  portrait = H > W;
}
window.addEventListener('resize', resize);
resize();

const concerts = Array.from({length:5}, (_,i)=>({
  date: new Date(2026, i, 10),
  title: "Concert " + (i+1),
  image: "https://picsum.photos/200/300?random="+i,
  link: "#"
}));

const images = {};
concerts.forEach(c=>{
  const img = new Image();
  img.src = c.image;
  images[c.image] = img;
});

function mountain(x){
  return H*0.35
    + Math.sin(x*0.002)*120
    + Math.sin(x*0.006)*60
    + Math.sin(x*0.02)*20;
}

function getLine(x, i){
  const flatten = i/4;
  const base = mountain(x);
  const flat = H*0.6 + Math.sin(x*0.002)*10;
  return base*(1-flatten) + flat*flatten + i*20;
}

const notes = concerts.map((c,i)=>({
  baseX: (i+1)*(W/(concerts.length+1)),
  x:0,
  yLevel: Math.floor(Math.random()*9)/2, // DANS LA PORTÉE
  hover:0,
  type: ["noire","croche","blanche"][Math.floor(Math.random()*3)],
  ...c
}));

let mouse = {x:-999,y:-999, active:false};
let scrollY = 0;
let targetScrollY = 0;

canvas.addEventListener('mousemove',e=>{
  mouse.x = e.clientX;
  mouse.y = e.clientY;
  mouse.active = true;
});
window.addEventListener('touchmove', e=>{
  const t = e.touches[0];
  targetScrollY -= e.movementY * 0.002 || 0;
});

canvas.addEventListener('mouseleave',()=>{
  mouse.active = false;
});

canvas.addEventListener('click',()=>{
  let clicked = notes.find(n=>n.hover>0.6);
  if(clicked && mouse.y<700 && mouse.y>300) showPopup(clicked);
  else hidePopup();
});

function showPopup(n){
  const p = document.getElementById('popup');
  p.innerHTML = `
    <h2>${n.title}</h2>
    <p>${n.date.toDateString()}</p>
    <img src="${n.image}"/>
    <br><br>
    <a href="${n.link}" target="_blank" style="color:#6cf">Billetterie</a>
  `;
  p.classList.add('active');
}

function hidePopup(){
  document.getElementById('popup').classList.remove('active');
}

function draw(){
  ctx.clearRect(0,0,W,H);

  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0,'#1a1a2e');
  g.addColorStop(1,'#0f0f14');
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // STAFF
  for(let i=0;i<5;i++){
    ctx.beginPath();
    for(let x=0;x<W;x++){
      const y = getLine(x,i);
      if(x===0) ctx.moveTo(x,y);
      else ctx.lineTo(x,y);
    }
    ctx.strokeStyle = "rgba(255,255,255,0.15)";
    ctx.stroke();
  }

  // POSITION MAPPING (focus souris) — DILATATION AUTOUR DE LA SOURIS
  notes.forEach(n=>{
    let targetX = n.baseX;

    if(mouse.active){
      const focus = mouse.x / W;
      const rel = n.baseX / W;
      const dist = rel - focus;

      // effet inverse : on ÉCARTE près de la souris, on COMPRESSE loin
      const influence = Math.exp(-Math.abs(dist)*5); // fort près, faible loin

      targetX = W * (rel + dist * influence * 0.8);
    }

    // retour fluide vers position cible
    n.x += (targetX - n.x)*0.08;
  });

  // NOTES
  notes.forEach(n=>{
    const flyer_w = 150
    const y = getLine(n.x, n.yLevel);

    const d = Math.abs(mouse.x-(flyer_w/2+n.x));
    const targetHover = (mouse.active && d<flyer_w)?1:0;
    n.hover += (targetHover - n.hover)*0.08;

    const size = 15 + n.hover*10;

    ctx.beginPath();
    ctx.ellipse(n.x,y,size,size*0.8,0,0,Math.PI*2);
    ctx.fillStyle = "white";
    if(n.type==="blanche") ctx.stroke(); else ctx.fill();

    const stemUp = n.yLevel > 1;
    const stemH = 100 + n.hover*50;
    const stemX = n.x + (stemUp?size:-size);

    ctx.beginPath();
    ctx.moveTo(stemX,y);
    ctx.lineTo(stemX, y + (stemUp?-stemH:stemH));
    ctx.stroke();

    if(n.type==="croche"){
      ctx.beginPath();
      ctx.moveTo(stemX, y + (stemUp?-stemH:stemH));
      ctx.quadraticCurveTo(stemX+20, y, stemX+5, y+(stemUp?-stemH/2:stemH/2));
      ctx.stroke();
    }

    const img = images[n.image];
    if(img.complete){
      const w = flyer_w + n.hover*60;
      const h = w*1.4;
      const anchorY = y + (stemUp?-stemH:30);
      const wave = Math.sin(Date.now()*0.0005 + n.x*0.01)*2;

      ctx.save();
      ctx.translate(stemX, anchorY);
      ctx.translate(20,0);
      ctx.transform(1, 0, wave*0.02, 1, 0, 0);
      ctx.drawImage(img,0,0,w,h);
      ctx.restore();
    }
  });

  requestAnimationFrame(draw);
}

notes.forEach(n=> n.x = n.baseX);

draw();
</script>
</body>
</html>
