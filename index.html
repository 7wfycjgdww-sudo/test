<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Animation Association</title>

<style>
body{
    margin:0;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background:#f5f7fa;
    overflow:hidden;
}

.logo{
    width:120px;
    height:120px;
    background:#2d7ff9;
    border-radius:50%;
    animation:pulse 2s infinite;
}

@keyframes pulse{
    0%{
        transform:scale(1);
        box-shadow:0 0 0 0 rgba(45,127,249,0.6);
    }

    70%{
        transform:scale(1.1);
        box-shadow:0 0 0 30px rgba(45,127,249,0);
    }

    100%{
        transform:scale(1);
    }
}
</style>
</head>
<body>

<div class="logo"></div>

</body>
</html>
