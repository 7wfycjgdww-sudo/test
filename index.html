<!DOCTYPE html>
<html lang="fr">
<head>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0" />
<title>Événements à venir</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    background: #0f0f14;
    overflow-x: hidden;
    min-height: 320vh;
    font-family: 'Poppins', sans-serif;
    touch-action: pan-y;
    color: white;
  }

  body {
    padding-bottom: 190px;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
    width: 100vw;
    height: 100vh;
    touch-action: pan-y;
    z-index: 1;
  }

  #content {
    position: fixed;
    left: 0;
    right: 0;
    bottom: 0;
    z-index: 2;
    padding: 16px 16px max(16px, env(safe-area-inset-bottom));
    display: flex;
    justify-content: center;
    pointer-events: none;
  }

  #infoPanel {
    width: min(100%, 760px);
    background: rgba(18, 18, 26, 0.6);
    border: 1px solid rgba(255,255,255,0.09);
    backdrop-filter: blur(20px);
    border-radius: 24px;
    padding: 18px 20px;
    box-shadow: 0 18px 60px rgba(0, 0, 0, 0.35);
    pointer-events: auto;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  #infoTitle {
    margin: 0 0 8px;
    font-size: clamp(22px, 3vw, 34px);
    line-height: 1.08;
  }

  #infoDate {
    margin: 0;
    opacity: 0.8;
  }

  #infoDesc {
    margin: 0;
    line-height: 1.55;
    max-width: 64ch;
  }

  #infoLink {
    display: inline-block;
    color: #6cf;
    text-decoration: none;
    border: 1px solid rgba(102, 204, 255, 0.35);
    padding: 10px 14px;
    border-radius: 999px;
    width: fit-content;
  }

  @media (max-width: 767px) {
    body {
      padding-bottom: 132px;
    }

    #content {
      padding: 10px 10px max(10px, env(safe-area-inset-bottom));
    }

    #infoPanel {
      position: fixed;
      top: max(10px, env(safe-area-inset-top));
      left: 10px;
      right: 10px;
      width: auto;
      max-width: none;
      padding: 12px 14px;
      border-radius: 18px;
      opacity: 0.92;
      gap: 6px;
      backdrop-filter: blur(14px);
    }

    #infoTitle {
      font-size: 19px;
      margin-bottom: 0;
      line-height: 1.1;
    }

    #infoDate {
      font-size: 13px;
      margin-bottom: 0;
    }

    #infoDesc {
      font-size: 14px;
      line-height: 1.35;
    }

    #infoLink {
      align-self: flex-end;
      margin-top: 4px;
      position: static;
    }
  }
</style>
</head>
<body>
<canvas id="c"></canvas>

<main id="content">
  <section id="infoPanel">
    <h2 id="infoTitle"></h2>
    <p id="infoDate"></p>
    <p id="infoDesc"></p>
    <a id="infoLink" href="#" target="_blank" rel="noopener noreferrer">Billetterie</a>
  </section>
</main>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');

// cadre de détails du concert sélectionné
const infoTitle = document.getElementById('infoTitle');
const infoDate = document.getElementById('infoDate');
const infoDesc = document.getElementById('infoDesc');
const infoLink = document.getElementById('infoLink');

const events = Array.from({ length: 5 }, (_, i) => ({
  date: new Date(2026, i, 10),
  title: 'Concert ' + (i + 1),
  flyer: 'https://picsum.photos/200/300?random=' + i,
  link: '#',
  description: [
    'Un flyer suspendu, un moment à venir, et une musique qui prend forme dans l’espace.',
    'Un concert imaginaire aux lignes souples, entre affichage graphique et partition vivante.',
    'Une date qui glisse dans le temps comme une note qui s’étire avant de retomber.',
    'Une affiche vivante, pensée comme un objet sonore autant que visuel. Une affiche vivante, pensée comme un objet sonore autant que visuel. Une affiche vivante, pensée comme un objet sonore autant que visuel.',
    'Le dernier flyer de la série, posé comme une cadence finale.'
  ][i]
}));

const flyers = {};
events.forEach(c => {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.src = c.flyer;
  flyers[c.flyer] = img;
});
const notes = events.map((c, i) => ({
  id: i,
  time: 0,
  pitch: Math.floor(Math.random() * 9),
  // hover: 0,
  type: ['noire', 'croche', 'blanche'][Math.floor(Math.random() * 3)],
  // hitBox: null,
  // flyerBox: null,
  ...c
}));

let mobileBoxes = [];  // positions des flyers en version mobile, mises à jour à chaque frame

//////////////////////////////////////////////////////////////////////
// Limite une valeur dans un intervalle.
function clamp(v, min, max) {
  return Math.max(min, Math.min(max, v));
}

// Interpolation linéaire simple entre deux valeurs.
function lerp(a, b, t) {
  return a + (b - a) * t;
}

// Interpolation entre deux rectangles.
function lerpBox(a, b, t) {
  return {
    x: lerp(a.x, b.x, t),
    y: lerp(a.y, b.y, t),
    w: lerp(a.w, b.w, t),
    h: lerp(a.h, b.h, t)
  };
}

// Adoucit une progression 0..1 pour éviter les mouvements trop secs.
function smoothstep(edge0, edge1, x) {
  const t = clamp((x - edge0) / (edge1 - edge0), 0, 1);
  return t * t * (3 - 2 * t);
}

// Met à jour le panneau d'information du flyer actif.
function syncInfoPanel(note) {
  if (!note || note.id === lastInfoId) return;
  lastInfoId = note.id;
  infoTitle.textContent = note.title;
  infoDate.textContent = note.date.toLocaleDateString('fr-FR', {
    day: 'numeric',
    month: 'long',
    year: 'numeric'
  });
  infoDesc.textContent = note.description;
  infoLink.href = note.link || '#';
}

function scrollToMobileFlyer(index) {
  const scrollable = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
  const target = clamp((index / events.length) * scrollable, 0, scrollable);
  window.scrollTo({ top: target, behavior: 'smooth' });
}

function getMobileFlyerIndexAtPoint(x, y) {
  let bestIndex = -1;
  let bestDist = Infinity;

  for (let i = 0; i < mobileBoxes.length; i++) {
    const box = mobileBoxes[i];
    if (!box) continue;

    const inside = x >= box.x && x <= box.x + box.w && y >= box.y && y <= box.y + box.h;
    if (inside) return i;

    const cx = box.x + box.w / 2;
    const cy = box.y + box.h / 2;
    const dist = Math.hypot(x - cx, y - cy);
    if (dist < bestDist) {
      bestDist = dist;
      bestIndex = i;
    }
  }

  return bestDist <= 90 ? bestIndex : -1;
}

// les mouvements de la souris
const mouse = { x: -9999, y: -9999, active: false };

canvas.addEventListener('pointermove', (e) => {
  if (mobileMode) return;
  const rect = canvas.getBoundingClientRect();
  mouse.x = e.clientX - rect.left;
  mouse.y = e.clientY - rect.top;
  mouse.active = true;
});

canvas.addEventListener('pointerleave', () => {
  mouse.active = false;
});

canvas.addEventListener('pointerdown', (e) => {
  if (!mobileMode) return;

  const rect = canvas.getBoundingClientRect();
  const x = e.clientX - rect.left;
  const y = e.clientY - rect.top;
  const index = getMobileFlyerIndexAtPoint(x, y);
  if (index < 0) return;

  e.preventDefault();
  scrollToMobileFlyer(index);
});

// les montagnes
function mountain(x) {
  const t = x / (mobileMode ? H : W);
  const g = (c, w, h) => h * Math.exp(-0.5 * ((t - c) / w) ** 2);
  return 150 + (-g(0.14, 0.07,  90) + g(0.24, 0.03,  18) - g(0.34, 0.05,  70) + g(0.48, 0.03,  45) - g(0.66, 0.06, 190) - g(0.76, 0.025, 80) + g(0.84, 0.03,  30) - g(0.93, 0.04, 100) );
}

function getLine(x, i) {
  const flatten = i / 8;
  const base = mountain(x);
  const flat = Math.sin(x * 0.002) * 10;
  return base * (1 - flatten) + flat * flatten + i * 40;

}

// la portée
function drawStaff() {
  let Xkey = 80;
  let Ykey = offset + gain * getLine(Xkey, 2*3) - 70;
  if (mobileMode) {
    Ykey = 40;
    Xkey = W - (offset + gain * getLine(Ykey, 2*3)) + 35
  }

  ctx.strokeStyle = 'rgba(255,255,255,0.15)';
  ctx.lineWidth = mobileMode ? 2 : 4;

  // la clé de sol
  ctx.save();
  ctx.translate(Xkey, Ykey);
  if (mobileMode) ctx.rotate(Math.PI / 2);
  ctx.fillStyle = 'rgba(255,255,255,0.26)';
  if (mobileMode) {
    ctx.font = `${Math.max(200, H * 0.2)}px "Times New Roman", serif`;
  } else {
    ctx.font = `${Math.max(500, H * 0.2)}px "Times New Roman", serif`; 
  }
  ctx.textBaseline = 'top';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('𝄞', 0, 0);
  ctx.restore();

  // les lignes
  // ctx.lineCap = 'round';
  for (let i = 0; i < 5; i++) {
    ctx.beginPath();
    for (let t = 0; t < 1; t += 0.01) {
      let T = mobileMode ? t*H : t*W
      let p = offset + gain * getLine(T, 2*i);
      let x = mobileMode ? (W-p) : T
      let y = mobileMode ? T : p
      if (T === 0) ctx.moveTo(x, y);
      else ctx.lineTo(x, y);
    }
    ctx.stroke();
  }
}

// le flyer
function drawFlyer(flyer, x, y, w, h) {
  const ir = flyer.width / flyer.height;
  const fr = w / h;

  let sx = 0, sy = 0, sw = flyer.width, sh = flyer.height;
  if (ir > fr) {
    sw = flyer.height * fr;
    sx = (flyer.width - sw) / 2;
  } else {
    sh = flyer.width / fr;
    sy = (flyer.width - sh) / 2;
  }

  if (flyer.complete) {
    ctx.drawImage(flyer, sx, sy, sw, sh, x, y, w, h);
  } else {
    ctx.fillStyle = '#222';
    ctx.fillRect(x, y, w, h);
  }
}

function drawNote(i, box, zoom=1, no_sway=false) {
  const t = (mobileMode ? box.y : box.x)
  const flyer = flyers[notes[i].flyer]
  const head_size = (mobileMode ? 7 : 25 + zoom * 10)
  const w = mobileMode ? head_size * 0.8 : head_size
  const h = mobileMode ? head_size : head_size * 0.8
  const stemUp = mobileMode ? false : (notes[i].pitch >= 4);
  const dir = stemUp ? 1 : -1;
  const stemLength = 140 + zoom * 500;
  const stemT = t + (stemUp ? (head_size-1) : (-head_size+1));
  const x_note = W - (offset + gain * getLine(t, notes[i].pitch))
  const lineTh = (mobileMode ? 2 : 3)

  //la tête
  ctx.beginPath();
  if (mobileMode) {
    ctx.ellipse(x_note, box.y, w, h, -0.3, 0, Math.PI * 2);
  } else {
    ctx.ellipse(box.x, box.y, w, h, -0.3, 0, Math.PI * 2);
  }
  if (notes[i].type === 'blanche') {
    ctx.strokeStyle = 'white';
    ctx.lineWidth = lineTh;
    ctx.stroke();
  } else {
    ctx.fillStyle = 'white';
    ctx.fill();
  }

  // la hampe
  ctx.beginPath();
  if (mobileMode) {
    ctx.moveTo(x_note, stemT);
    ctx.lineTo(box.x, stemT);
  } else {
    ctx.moveTo(stemT, box.y);
    ctx.lineTo(stemT, box.y + (stemUp ? -stemLength : stemLength));
  }
  ctx.strokeStyle = 'white';
  ctx.lineWidth = lineTh;
  ctx.lineCap = 'round';
  ctx.stroke();
  if (notes[i].type === 'croche') {
    if (mobileMode) {
      const x0 = box.x - 50;
      ctx.beginPath();
      ctx.moveTo(box.x, stemT);
      ctx.lineTo(x0, stemT);
      ctx.bezierCurveTo(
        x0 + 2,  stemT + 10,
        x0 + 20, stemT + 28,
        x0 + 42, stemT + 18
      );
      ctx.bezierCurveTo(
        x0 + 52, stemT + 12,
        x0 + 46, stemT + 4,
        x0 + 34, stemT + 6
      );
    } else {
      const y0 = box.y + (stemUp ? -stemLength : stemLength);
      ctx.beginPath();
      ctx.moveTo(stemT, y0);
      ctx.bezierCurveTo(
        stemT + 10, y0 + 2 * dir,
        stemT + 28, y0 + 20 * dir,
        stemT + 18, y0 + 42 * dir
      );
      ctx.bezierCurveTo(
        stemT + 12, y0 + 52 * dir,
        stemT + 4, y0 + 46 * dir,
        stemT + 6, y0 + 34 * dir
      );
    }
    ctx.stroke();
  }

  const w_current = (mobileMode ? box.w : flyer_W + zoom * 1000);
  const h_current = (mobileMode ? box.h : w_current * 1.4);
  const anchorY = box.y + (stemUp ? -stemLength : 30);
  const sway = Math.sin(Date.now() * 0.0005 + 5*i) * 2;

  ctx.save();
  if (mobileMode) {
    ctx.translate(box.x, box.y);
  } else { 
    ctx.translate(stemT + 20, anchorY);
  }
  if (!no_sway) {
    ctx.transform(1, 0, sway * 0.02, 1, 0, 0);
  }
  drawFlyer(flyer, 0, 0, w_current, h_current);
  ctx.restore();
}

// Construit une boîte mobile à partir d'une case de rangée.
function rowBox(slotIndex, slotCount, y, boxW, boxH, kind, t, drift = 0) {
  const margin = clamp(W * 0.035, 10, 18);

  if (slotCount <= 0) {
    return (W - boxW) / 2;
  }

  const spread = Math.max(0, W - 2 * margin - boxW);

  // Grille stable : le mouvement ne dépend pas du nombre d'éléments visibles.
  const base = margin + (slotIndex+1) / (slotCount+1) * spread;
  const edgeResistance = ((slotCount <= 1) ? 1 : 0.78 + 0.22 * Math.sin(Math.PI * slotIndex / slotCount))
  const resistedDrift = drift * edgeResistance;

  const rowX = clamp(base + resistedDrift, margin, W - margin - boxW);
  return {x: rowX, y, w: boxW, h: boxH};
}

function animate() {
  let activeNote = notes[0]
  ctx.clearRect(0,0,W,H)
  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, '#151525');
  g.addColorStop(1, '#0f0f14');
  ctx.fillStyle = g;
  ctx.fillRect(0, 0, W, H);
  drawStaff()
  if (mobileMode) {
    mobileBoxes = [];
    const scrollable = Math.max(1, document.documentElement.scrollHeight - window.innerHeight);
    let scrollProgress = clamp((window.scrollY / scrollable) * events.length, 0, events.length - 0.001);
    let active = Math.floor(scrollProgress) % events.length;
    scrollProgress = scrollProgress - active

    // Phases de mouvement séparées pour éviter les déplacements synchrones.
    const topPhase = smoothstep(0.00, 0.50, scrollProgress);
    const swapPhase = smoothstep(0.42, 0.72, scrollProgress);
    const bottomPhase = smoothstep(0.00, 1.00, scrollProgress);

    const thumbW = clamp(W * 0.16, 54, 72);
    const thumbH = Math.round(thumbW * 1.1);
    const centerW = clamp(W * 0.64, 190, 330);
    const centerH = Math.round(centerW * 1.3);

    const topY = Math.max(10, H * 0.2);
    const centerY = topY + thumbH + 10
    const bottomY = centerY + centerH

    const centerBox = {
      x: (W - centerW) / 2,
      y: centerY,
      w: centerW,
      h: centerH
    };

    // Petit mouvement global pour que les coins ne soient jamais totalement figés.
    const topDrift = (topPhase - 0.5) * 8;
    const bottomDrift = -(bottomPhase - 0.5) * 8;

    // smaller flyer closer to staff to let note get through
    const scale = 5
    let box = {}
    let no_sway = false

    for (let i = 0; i < events.length; i++) {
      no_sway = false
      if (i===active) {
        // Flyer actif : il reste au centre puis bascule vite vers le haut.
        const topDestination = rowBox(i, i+1, topY+i*scale, thumbW-i*scale, thumbH-i*scale, 'top', topPhase, topDrift);
        box = lerpBox(centerBox, topDestination, swapPhase);
        // if (scrollProgress === 0) {
          no_sway = true
        // }
      }
      if (i===(active+1)) {
        // Flyer suivant : il part du bas et remplace l'ancien actif au centre.
        if (notes[(active + 1) % events.length]) {
          const nextIndex = i % events.length;
          const startBox = rowBox(0, events.length-i+1, bottomY, thumbW, thumbH, 'bottom', bottomPhase, bottomDrift);
          box = lerpBox(startBox, centerBox, swapPhase);
          no_sway = true
        }
      }
      if (i<active) {
        // Rangée du haut : les flyers déjà passés se tassent légèrement.
        const startBox = rowBox(i, active, topY+i*scale, thumbW-i*scale, thumbH-i*scale, 'top', topPhase, topDrift);
        const endBox = rowBox(i, active+1, topY+i*scale, thumbW-i*scale, thumbH-i*scale, 'top', topPhase, topDrift);
        box = lerpBox(startBox, endBox, topPhase);
      } else {
        if (i>active+1) {
          // Autres flyers du bas : ils s'écartent pendant toute la transition.
          const j = i - active - 2
          const startBox = rowBox(j+1, events.length - active, bottomY+(j+1)*scale, thumbW-(j+1)*scale, thumbH-(j+1)*scale, 'bottom', 0, bottomDrift);
          const endBox = rowBox(j, events.length - active - 1, bottomY+j*scale, thumbW-j*scale, thumbH-j*scale, 'bottom', bottomPhase, bottomDrift);
          box = lerpBox(startBox, endBox, bottomPhase);
        }
      }
      mobileBoxes[i] = box;
      drawNote(i, box, 0, no_sway);
      activeNote = notes[(scrollProgress>0.5 ? active + 1 : active)]
    }
  } else {
    let bestZoom = 0
    notes.forEach((note,i) => {
      note.time = (i + 1) * (W / (events.length + 1));
      let dist = (note.time - mouse.x) / W
      const influence = 0.8*Math.exp(-Math.abs(dist) * 5);
      const targetX = mouse.active
        ? W * (note.time/W + dist * influence)
        : note.time
      let x = mobileMode ? W * 0.5 : note.time;
      x = targetX * 0.08 + x * 0.92
      let y = offset + gain * getLine(x, note.pitch)
      dist = Math.hypot(mouse.x - x, mouse.y - y)

      let zoom = mouse.active ? 0.08 * clamp(1 - dist/160,0,1) : 0
      if (zoom > bestZoom) {
        bestZoom = zoom
        activeNote = note
      }
      const box = {x: x, y: y}
      drawNote(i, box, zoom)
    });
  };
  syncInfoPanel(activeNote);
  requestAnimationFrame(animate);
}

//////////////////////////////////////////////////////////////////////
/////////////////////    Debut du script    //////////////////////////
//////////////////////////////////////////////////////////////////////
let mobileMode = window.innerWidth < 768;
let dpr = window.devicePixelRatio || 1;
let lastInfoId = -1;
const iframe_scale = 0.88;

let W = window.innerWidth;
let H = window.innerHeight;
// if (mobileMode) {
//   H *= iframe_scale
// } else {
//   W *= iframe_scale
// }

let flyer_W = W / 10;
let offset = mobileMode ? W * 0.1 : H * 0.2;
let gain = mobileMode ? 0.2 : 1;

function resizeCanvas() {
  mobileMode = window.innerWidth < 768;
  dpr = window.devicePixelRatio || 1;
  W = window.innerWidth;
  H = window.innerHeight;

  flyer_W = W / 10;
  offset = mobileMode ? W * 0.1 : H * 0.2;
  gain = mobileMode ? 0.2 : 1;

  canvas.width = Math.round(W * dpr);
  canvas.height = Math.round(H * dpr);
  canvas.style.width = W + 'px';
  canvas.style.height = H + 'px';

  ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
}

resizeCanvas();
window.addEventListener('resize', resizeCanvas, { passive: true });
window.visualViewport?.addEventListener('resize', resizeCanvas, { passive: true });

// notes.forEach((n, i) => {
//   n.time = (i + 1) * (W / (events.length + 1));
//   n.renderX = mobileMode ? W * 0.5 : n.baseX;
//   n.renderY = H * 0.5;

// const g = ctx.createLinearGradient(0, 0, 0, H);
// g.addColorStop(0, '#151525');
// g.addColorStop(1, '#0f0f14');
// ctx.fillStyle = g;
// ctx.fillRect(0, 0, W, H);

// updateScrollProgress();
syncInfoPanel(notes[0]);
animate()
</script>
</body>
</html>
